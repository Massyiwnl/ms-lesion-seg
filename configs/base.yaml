# Configurazione di default. Ogni esperimento è un file che sovrascrive questa.
project:
  name: ms-lesion-seg
  seed: 42
  deterministic: false
  output_dir: ./runs/base       # dove salvare checkpoint / log / risultati

paths:
  # NON modificare qui: crea `configs/local.yaml` (vedi local.yaml.example).
  # Quel file non è versionato e sovrascrive questi valori sulla tua macchina.
  data_root: /content/drive/MyDrive/MSLesSeg            # root MSLesSeg (con train/ test/)
  processed_root: /content/drive/MyDrive/MSLesSeg_proc  # volumi normalizzati (.npy)
  metadata_csv: null            # info_dataset/clinical_data.csv (sesso, età, EDSS)
  scanner_csv: null             # info_dataset/patient_scanners_info/..._FLAIR.csv

data:
  modalities: [FLAIR, T1, T2]   # il sottoinsieme guida l'ablation multimodale (es. [FLAIR])
  context_slices: 1             # 2.5D: +/- N slice adiacenti per modalità (0 = 2D puro)
  plane: axial
  spatial_size: [192, 192]      # dimensione in-plane dopo crop/pad
  pos_neg_ratio: 0.5            # frazione target di slice con lesione per epoca (train)
  min_brain_fraction: 0.02      # scarta slice quasi vuote (fuori dal cervello)
  min_lesion_voxels: 1          # voxel minimi per considerare una slice "positiva"
  normalization: zscore_nonzero # zscore_nonzero | minmax_nonzero (solo voxel cervello)
  clip_percentiles: [0.5, 99.5] # clipping robusto degli outlier (null per disattivare)
  crop_to_brain: true           # ritaglia le slice fuori dal cervello (meno disco)
  z_margin: 2                   # slice di margine attorno al cervello
  store_dtype: float16          # dtype su disco (float16 dimezza lo spazio)
  samples_per_epoch: null       # slice estratte per epoca (null = tutte). Abbassalo
                                # (es. 6000) per epoche più brevi e validazioni frequenti
  # Parsing filename: {paziente}_{timepoint}_{modalità}.nii.gz  (VERIFICARE con 00_inspect)
  filename_pattern: '^(?P<patient>[^_/]+)_(?:(?P<timepoint>[^_/]+)_)?(?P<modality>[^_/.]+)$'
  modality_aliases:
    FLAIR: [FLAIR, flair]
    T1: [T1, t1]
    T2: [T2, t2]
    mask: [MASK, mask, seg, gt, lesion, consensus]

domain:                         # esperimento robustezza cross-protocollo (Fase 6)
  # Il dataset NON riporta il field strength: l'asse di dominio è lo spessore di slice
  # (thin <=2.5mm / thick >=3mm), asse secondario il produttore (vendor).
  split_by: null                # es. 'thickness_band' o 'vendor'; null = split standard
  train_domain: null            # es. 'thick'
  test_domain: null             # es. 'thin'

model:
  arch: unet                    # unet | attention_unet | dynunet | swin_unetr (stretch)
  in_channels: auto             # auto = len(modalities) * (2*context_slices + 1)
  out_channels: 1               # segmentazione binaria (lesione)
  features: [32, 64, 128, 256, 512]
  deep_supervision: false
  dropout: 0.0

loss:
  name: dice                    # dice | dice_focal | dice_ce | tversky
  batch_dice: true              # Dice sul batch aggregato: evita il collasso a
                                # predizione vuota (vedi docstring di losses.py)
  sigmoid: true
  tversky_alpha: 0.3            # peso FP; alpha<beta penalizza di più i falsi negativi
  tversky_beta: 0.7
  deep_supervision_weights: [1.0, 0.5, 0.25, 0.125]

regularization:
  jacobian: false
  jacobian_lambda: 0.01
  jacobian_n_proj: 1

train:
  epochs: 100
  batch_size: 16
  optimizer: adamw
  lr: 0.001
  weight_decay: 0.00001
  scheduler: cosine             # cosine | plateau | none
  amp: true                     # mixed precision (T4)
  num_workers: 0                # 0 = sicuro su Windows/notebook; su Colab/Linux usa 2-4
  val_interval: 1
  early_stopping_patience: 20
  grad_clip: null

augment:
  enabled: true
  rand_flip_prob: 0.5
  rand_rotate_prob: 0.5
  rand_rotate_range_deg: 10
  rand_zoom_prob: 0.3
  rand_zoom_min: 0.9
  rand_zoom_max: 1.1
  rand_intensity_prob: 0.3
  bias_field_prob: 0.0          # >0 abilita la bias-field augmentation (robustezza dominio)
  rand_gaussian_noise_prob: 0.0

eval:
  threshold: 0.5
  hd95: true
  assd: true
  lesion_wise: true
  min_lesion_size: 3            # voxel; soglia per le metriche lesion-wise
  postproc_min_size: 0          # >0: elimina dalle predizioni le componenti più
                                # piccole di N voxel (post-processing, da ablare)
  subgroups: [sex, age_band, vendor, thickness_band, scanner_model]
  save_predictions: true

explain:
  gradcam_layer: null           # es. 'bottleneck'
  n_examples: 8
